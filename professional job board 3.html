            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hero {

            text-align: center;
            position: relative;
            overflow: hidden;
        }

            left: 0;
            right: 0;

            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        .hero p {
            font-size: 1.3rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .container {

            margin: 0 auto;
            padding: 0 2rem;
        }

            background: rgba(25, 25, 25, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin: -2rem auto 3rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 1.5rem;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-weight: 600;
            color: #ffffff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-input, .filter-select {

            background: rgba(0,0,0,0.3);

            font-size: 1rem;

        .search-input:focus, .filter-select:focus {

            border-color: #e50914;
            box-shadow: 0 0 0 3px rgba(229,9,20,0.2);
            transform: translateY(-2px);

        }

        .filter-select option {
            background: #1a1a1a;
            color: #ffffff;
        }

        .sort-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .sort-btn {
            padding: 0.75rem 1rem;
            background: rgba(229,9,20,0.1);
            border: 2px solid rgba(229,9,20,0.3);
            border-radius: 10px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .sort-btn:hover, .sort-btn.active {
            background: #e50914;
            border-color: #e50914;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229,9,20,0.3);
        }

        .stats-bar {

            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);

        .job-count {

            font-weight: 600;
            color: #e50914;
        }

        .view-toggle {

            gap: 0.5rem;
        }

        .view-btn {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: #e50914;
        }

        .jobs-grid {

            margin-bottom: 3rem;

        .jobs-list {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .job-card {

            padding: 2rem;

            overflow: hidden;

            left: 0;
            right: 0;
            height: 4px;

            transform: scaleX(0);

            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .job-title {

            font-size: 0.9rem;
            border: 1px solid rgba(229,9,20,0.2);

        }

            border-color: rgba(239,68,68,0.3);

        }

        .job-description {

            color: #ffffff;

            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;

        }

        .job-actions-secondary {

            gap: 1rem;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            color: #ffffff;
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;

            height: 50px;

            border-top: 4px solid #e50914;
            border-radius: 50%;

            margin: 0 auto 1rem;
        }

            0% { transform: rotate(0deg); }

        }

        .pagination {
            display: flex;

            gap: 1rem;

            border-color: #e50914;
            transform: translateY(-2px);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .filters-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .jobs-grid {
                grid-template-columns: 1fr;
            }
            
            .hero h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            .filters-section {
                padding: 1.5rem;
            }
            
            .job-card {
                padding: 1.5rem;
            }
            
            .job-header {
                flex-direction: column;
                gap: 1rem;
            }
            
            .job-actions {
                flex-direction: column;
                gap: 1rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

            let timeout;

                    clearTimeout(timeout);

                clearTimeout(timeout);

                    job.tags.some(tag => tag.toLowerCase().includes(searchTerm));

                const matchesCategory = !selectedCategory || job.category === selectedCategory;
                const matchesLocation = !selectedLocation || job.location === selectedLocation;
                const matchesType = !selectedType || job.type === selectedType;

                return matchesSearch && matchesCategory && matchesLocation && matchesType;
            });

            applySorting();
            currentPage = 1;
            renderJobs();
            updateJobCount();
            renderPagination();
        }

        function handleSort(e) {
            const sortType = e.target.dataset.sort;
            if (currentSort === sortType) return;

            sortButtons.forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentSort = sortType;

            applySorting();
            renderJobs();
        }

        function applySorting() {
            filteredJobs.sort((a, b) => {
                switch (currentSort) {
                    case 'date':
                        return new Date(b.postedDate) - new Date(a.postedDate);
                    case 'salary':
                        const salaryA = parseInt(a.salary.replace(/[^\d]/g, ''));
                        const salaryB = parseInt(b.salary.replace(/[^\d]/g, ''));
                        return salaryB - salaryA;
                    case 'relevance':
                        // Simple relevance based on urgent jobs and recent posts
                        const scoreA = (a.urgent ? 2 : 0) + (new Date(a.postedDate) > new Date('2024-01-10') ? 1 : 0);
                        const scoreB = (b.urgent ? 2 : 0) + (new Date(b.postedDate) > new Date('2024-01-10') ? 1 : 0);
                        return scoreB - scoreA;
                    default:
                        return 0;
                }
            });
        }

        function handleViewChange(e) {
            const viewType = e.target.dataset.view;
            if (currentView === viewType) return;

            viewButtons.forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentView = viewType;

            if (viewType === 'grid') {
                jobsList.style.display = 'none';
                jobsGrid.style.display = 'grid';
            } else {
                jobsGrid.style.display = 'none';
                jobsList.style.display = 'flex';
            }

            renderJobs();
        }

        function renderJobs() {
            const startIndex = (currentPage - 1) * jobsPerPage;
            const endIndex = startIndex + jobsPerPage;
            const jobsToShow = filteredJobs.slice(startIndex, endIndex);

            const container = currentView === 'grid' ? jobsGrid : jobsList;
            container.innerHTML = '';

            if (jobsToShow.length === 0) {
                container.innerHTML = `
                    <div class="no-jobs">
                        <h3>No jobs found</h3>
                        <p>Try adjusting your search criteria or filters to find more opportunities.</p>
                    </div>
                `;
                return;
            }

            jobsToShow.forEach((job, index) => {
                const jobCard = createJobCard(job);
                jobCard.style.animationDelay = `${index * 0.1}s`;
                jobCard.classList.add('fade-in');
                container.appendChild(jobCard);
            });
        }

        function createJobCard(job) {
            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `
                <div class="job-header">
                    <div>
                        <h3 class="job-title">${job.title}</h3>
                        <div class="job-company">${job.company}</div>
                    </div>
                    <div class="job-salary">${job.salary}</div>
                </div>
                
                <div class="job-meta">
                    <div class="job-meta-item">
                        <span>📍</span>
                        <span>${job.location}</span>
                    </div>
                    <div class="job-meta-item">
                        <span>🕒</span>
                        <span>${job.type}</span>
                    </div>
                    <div class="job-meta-item">
                        <span>💼</span>
                        <span>${job.experience}</span>
                    </div>
                    <div class="job-meta-item">
                        <span>📅</span>
                        <span>${formatDate(job.postedDate)}</span>
                    </div>
                </div>
                
                <div class="job-tags">
                    ${job.tags.map(tag => `<span class="job-tag">${tag}</span>`).join('')}
                    ${job.remote ? '<span class="job-tag remote">Remote</span>' : ''}
                    ${job.urgent ? '<span class="job-tag urgent">Urgent</span>' : ''}
                </div>
                
                <div class="job-description">
                    ${job.description}
                </div>
                
                <div class="job-actions">
                    <button class="apply-btn" onclick="applyToJob(${job.id})">Apply Now</button>
                    <div class="job-actions-secondary">
                        <button class="action-btn" onclick="saveJob(${job.id})" title="Save Job">
                            💾
                        </button>
                        <button class="action-btn" onclick="shareJob(${job.id})" title="Share Job">
                            🔗
                        </button>
                        <button class="action-btn" onclick="viewCompany('${job.company}')" title="View Company">
                            🏢
                        </button>
                    </div>
                </div>
            `;
            return card;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 1) return 'Today';
            if (diffDays === 2) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            return `${Math.floor(diffDays / 30)} months ago`;
        }

        function updateJobCount() {
            jobCount.textContent = filteredJobs.length;
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredJobs.length / jobsPerPage);
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '← Previous';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => changePage(currentPage - 1);
            pagination.appendChild(prevBtn);

            // Page numbers
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => changePage(i);
                pagination.appendChild(pageBtn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = 'Next →';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => changePage(currentPage + 1);
            pagination.appendChild(nextBtn);
        }

        function changePage(page) {
            currentPage = page;
            renderJobs();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Action functions
        function applyToJob(jobId) {
            const job = jobsData.find(j => j.id === jobId);
            if (job) {
                // Simulate application process
                showNotification(`Application submitted for ${job.title} at ${job.company}!`, 'success');
                
                // In a real app, this would send data to a server
                setTimeout(() => {
                    showNotification('We\'ll be in touch soon!', 'info');
                }, 2000);
            }
        }

        function saveJob(jobId) {
            const job = jobsData.find(j => j.id === jobId);
            if (job) {
                showNotification(`${job.title} saved to your favorites!`, 'success');
            }
        }

        function shareJob(jobId) {
            const job = jobsData.find(j => j.id === jobId);
            if (job) {
                if (navigator.share) {
                    navigator.share({
                        title: job.title,
                        text: `Check out this job opportunity: ${job.title} at ${job.company}`,
                        url: window.location.href
                    });
                } else {
                    // Fallback for browsers that don't support Web Share API
                    navigator.clipboard.writeText(window.location.href);
                    showNotification('Job link copied to clipboard!', 'success');
                }
            }
        }

        function viewCompany(company) {
            showNotification(`Viewing ${company} company profile...`, 'info');
            // In a real app, this would navigate to company page
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3b82f6'};
                color: white;
                padding: 1rem 2rem;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                font-weight: 600;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Add CSS for notification animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Advanced features
        function exportJobs() {
            const dataStr = JSON.stringify(filteredJobs, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'jobs-export.json';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // Accessibility improvements
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.classList.contains('job-card')) {
                e.target.querySelector('.apply-btn').click();
            }
        });

        // Add keyboard navigation
        document.querySelectorAll('.job-card').forEach(card => {
            card.setAttribute('tabindex', '0');
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', 'Job posting');
        });
    </script>
</body>
</html>
