<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCareers Pro - Premium Job Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0078d4;
            --secondary-blue: #106ebe;
            --accent-blue: #40e0d0;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --success-green: #107c10;
            --warning-orange: #ff8c00;
            --error-red: #d13438;
            --border-color: #404040;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #2a2a2a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-blue), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat-item {
            text-align: center;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(0, 120, 212, 0.1);
            border: 1px solid var(--primary-blue);
        }

        .stat-number {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Search Section */
        .search-section {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            padding: 3rem 0;
            text-align: center;
        }

        .search-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .search-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--dark-bg);
            font-size: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .search-btn {
            padding: 1rem 2rem;
            background: var(--warning-orange);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .search-btn:hover {
            background: #e67e00;
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
        }

        /* Filters Section */
        .filters-section {
            background: var(--card-bg);
            padding: 2rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .filter-select {
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--dark-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.2);
        }

        .sort-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .view-toggle {
            display: flex;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .view-btn {
            padding: 0.5rem 1rem;
            background: var(--dark-bg);
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        .results-count {
            font-weight: 600;
            color: var(--accent-blue);
            padding: 0.5rem 1rem;
            background: rgba(64, 224, 208, 0.1);
            border-radius: 8px;
            border: 1px solid var(--accent-blue);
        }

        /* Jobs Section */
        .jobs-section {
            padding: 2rem 0;
            min-height: 70vh;
        }

        .jobs-container {
            display: grid;
            gap: 1.5rem;
        }

        .jobs-grid {
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        }

        .jobs-list {
            grid-template-columns: 1fr;
        }

        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .job-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-blue));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-color);
            border-color: var(--primary-blue);
        }

        .job-card:hover::before {
            transform: scaleX(1);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .job-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .job-company {
            color: var(--primary-blue);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .job-salary {
            background: var(--success-green);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .job-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .job-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .job-tag {
            background: rgba(0, 120, 212, 0.2);
            color: var(--accent-blue);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--primary-blue);
        }

        .job-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .job-posted {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .apply-btn {
            background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .apply-btn:hover {
            background: linear-gradient(45deg, var(--secondary-blue), var(--primary-blue));
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.4);
        }

        .job-card.list-view {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 2rem;
            align-items: center;
        }

        .job-card.list-view .job-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 2rem;
            align-items: center;
        }

        .job-card.list-view .job-tags {
            margin-bottom: 0;
        }

        .job-card.list-view .job-footer {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 120, 212, 0.3);
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .no-results-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .header-stats {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .search-container {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                min-width: auto;
            }

            .filters-container {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                justify-content: space-between;
            }

            .jobs-container {
                grid-template-columns: 1fr;
            }

            .job-card.list-view .job-content {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .job-card.list-view {
                grid-template-columns: 1fr;
            }
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Focus styles */
        .job-card:focus {
            outline: 3px solid var(--primary-blue);
            outline-offset: 2px;
        }

        button:focus,
        input:focus,
        select:focus {
            outline: 3px solid var(--primary-blue);
            outline-offset: 2px;
        }
    </style>
</head>

                return posted.includes('day') || posted.includes('hour');
            }).length;
            const companies = new Set(jobsData.map(job => job.company)).size;

            totalJobsEl.textContent = totalJobs;
            activeJobsEl.textContent = activeJobs;
            companiesEl.textContent = companies;
        }

        // Attach event listeners
        function attachEventListeners() {
            searchInput.addEventListener('input', debounce(applyFilters, 300));
            searchBtn.addEventListener('click', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
            locationFilter.addEventListener('change', applyFilters);
            experienceFilter.addEventListener('change', applyFilters);
            salaryFilter.addEventListener('change', applyFilters);
            sortSelect.addEventListener('change', handleSort);
            gridViewBtn.addEventListener('click', () => toggleView('grid'));
            listViewBtn.addEventListener('click', () => toggleView('list'));
            
            // Enter key support for search
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    applyFilters();
                }
            });
        }

        // Debounce function for search input
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Apply all filters and search
        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const selectedCategory = categoryFilter.value;
            const selectedLocation = locationFilter.value;
            const selectedExperience = experienceFilter.value;
            const selectedSalary = salaryFilter.value;

            filteredJobs = jobsData.filter(job => {
                // Search filter
                const matchesSearch = !searchTerm || 
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm) ||
                    job.description.toLowerCase().includes(searchTerm) ||
                    job.tags.some(tag => tag.toLowerCase().includes(searchTerm));

                // Category filter
                const matchesCategory = !selectedCategory || job.category === selectedCategory;

                // Location filter
                const matchesLocation = !selectedLocation || 
                    job.location === selectedLocation ||
                    (selectedLocation === 'Remote' && job.remote);

                // Experience filter
                const matchesExperience = !selectedExperience || job.experience === selectedExperience;

                // Salary filter
                const matchesSalary = !selectedSalary || checkSalaryRange(job, selectedSalary);

                return matchesSearch && matchesCategory && matchesLocation && matchesExperience && matchesSalary;
            });

            sortJobs();
            renderJobs();
            updateResultsCount();
        }

        // Check if job salary matches selected range
        function checkSalaryRange(job, salaryRange) {
            if (salaryRange === '200000+') {
                return job.salaryMin >= 200000;
            }
            
            const [min, max] = salaryRange.split('-').map(Number);
            return job.salaryMin >= min && job.salaryMax <= max;
        }

        // Sort jobs based on selected criteria
        function sortJobs() {
            const sortBy = sortSelect.value;
            
            filteredJobs.sort((a, b) => {
                switch (sortBy) {
                    case 'date':
                        return getDateValue(a.posted) - getDateValue(b.posted);
                    case 'salary':
                        return b.salaryMax - a.salaryMax;
                    case 'company':
                        return a.company.localeCompare(b.company);
                    case 'relevance':
                    default:
                        return 0; // Keep original order for relevance
                }
            });
        }

        // Convert posted date to comparable value
        function getDateValue(posted) {
            if (posted.includes('hour')) return 0;
            if (posted.includes('day')) return parseInt(posted);
            if (posted.includes('week')) return parseInt(posted) * 7;
            if (posted.includes('month')) return parseInt(posted) * 30;
            return 999;
        }

        // Handle sort change
        function handleSort() {
            currentSort = sortSelect.value;
            sortJobs();
            renderJobs();
        }

        // Toggle between grid and list view
        function toggleView(view) {
            currentView = view;
            
            if (view === 'grid') {
                gridViewBtn.classList.add('active');
                listViewBtn.classList.remove('active');
                jobsContainer.classList.remove('jobs-list');
                jobsContainer.classList.add('jobs-grid');
            } else {
                listViewBtn.classList.add('active');
                gridViewBtn.classList.remove('active');
                jobsContainer.classList.remove('jobs-grid');
                jobsContainer.classList.add('jobs-list');
            }
            
            renderJobs();
        }

        // Render jobs to the DOM
        function renderJobs() {
            if (filteredJobs.length === 0) {
                jobsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3 class="no-results-title">No jobs found</h3>
                        <p>Try adjusting your search criteria or filters.</p>
                    </div>
                `;
                return;
            }

            jobsContainer.innerHTML = filteredJobs.map(job => createJobCard(job)).join('');
            
            // Add click handlers for job cards
            document.querySelectorAll('.job-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    // Don't trigger if clicking on apply button
                    if (e.target.classList.contains('apply-btn')) return;
                    
                    const jobId = parseInt(card.dataset.jobId);
                    showJobDetails(jobId);
                });
                
                // Make cards keyboard accessible
                card.setAttribute('tabindex', '0');
                card.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        const jobId = parseInt(card.dataset.jobId);
                        showJobDetails(jobId);
                    }
                });
            });

            // Add click handlers for apply buttons
            document.querySelectorAll('.apply-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const jobId = parseInt(btn.dataset.jobId);
                    handleApply(jobId);
                });
            });
        }

        // Create job card HTML
        function createJobCard(job) {
            const isListView = currentView === 'list';
            const cardClass = isListView ? 'job-card list-view' : 'job-card';
            
            if (isListView) {
                return `
                    <div class="${cardClass}" data-job-id="${job.id}" role="button" aria-label="View job details for ${job.title}">
                        <div class="job-content">
                            <div>
                                <h3 class="job-title">${job.title}</h3>
                                <div class="job-company">${job.company}</div>
                                <div class="job-meta">
                                    <span class="job-meta-item">📍 ${job.location}</span>
                                    <span class="job-meta-item">💼 ${job.experience}</span>
                                    <span class="job-meta-item">🕒 ${job.posted}</span>
                                </div>
                            </div>
                            <div class="job-tags">
                                ${job.tags.map(tag => `<span class="job-tag">${tag}</span>`).join('')}
                            </div>
                            <div class="job-salary">${job.salary}</div>
                            <button class="apply-btn" data-job-id="${job.id}" aria-label="Apply for ${job.title}">Apply Now</button>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="${cardClass}" data-job-id="${job.id}" role="button" aria-label="View job details for ${job.title}">
                    <div class="job-header">
                        <div>
                            <h3 class="job-title">${job.title}</h3>
                            <div class="job-company">${job.company}</div>
                        </div>
                        <div class="job-salary">${job.salary}</div>
                    </div>
                    
                    <div class="job-meta">
                        <span class="job-meta-item">📍 ${job.location}</span>
                        <span class="job-meta-item">💼 ${job.experience}</span>
                        <span class="job-meta-item">🕒 ${job.posted}</span>
                        ${job.remote ? '<span class="job-meta-item">🌐 Remote</span>' : ''}
                    </div>
                    
                    <p class="job-description">${job.description}</p>
                    
                    <div class="job-tags">
                        ${job.tags.map(tag => `<span class="job-tag">${tag}</span>`).join('')}
                    </div>
                    
                    <div class="job-footer">
                        <span class="job-posted">Posted ${job.posted}</span>
                        <button class="apply-btn" data-job-id="${job.id}" aria-label="Apply for ${job.title}">Apply Now</button>
                    </div>
                </div>
            `;
        }

        // Update results count
        function updateResultsCount() {
            const count = filteredJobs.length;
            resultsCount.textContent = `${count} job${count !== 1 ? 's' : ''} found`;
        }

        // Show job details (simulated)
        function showJobDetails(jobId) {
            const job = jobsData.find(j => j.id === jobId);
            if (!job) return;
            
            // In a real application, this would navigate to a detailed job page
            // For demo purposes, we'll show an alert
            alert(`Job Details:\n\n${job.title} at ${job.company}\n${job.location}\n${job.salary}\n\n${job.description}\n\nSkills: ${job.tags.join(', ')}`);
        }

        // Handle job application
        function handleApply(jobId) {
            const job = jobsData.find(j => j.id === jobId);
            if (!job) return;
            
            // In a real application, this would open an application form or redirect
            // For demo purposes, we'll show a confirmation
            if (confirm(`Apply for ${job.title} at ${job.company}?\n\nThis would normally redirect to the application process.`)) {
                alert('Application submitted successfully! You will be redirected to the company\'s application portal.');
            }
        }

        function performAdvancedSearch() {
            // This could include more complex search features like:
            // - Boolean search operators
            // - Saved searches
            // - Search suggestions
            // - Recent searches
            console.log('Advanced search functionality would be implemented here');
        }

        // Job alerts system (simulated)
        function setupJobAlerts() {
            // This would allow users to set up email alerts for matching jobs
            console.log('Job alerts system would be implemented here');
        }

        // Analytics tracking (simulated)
        function trackEvent(eventName, data) {
            // In a real application, this would send analytics data
            console.log(`Event: ${eventName}`, data);
        }

        // Accessibility enhancements
        function enhanceAccessibility() {
            // Add ARIA labels dynamically
            document.querySelectorAll('.job-card').forEach((card, index) => {
                card.setAttribute('aria-posinset', index + 1);
                card.setAttribute('aria-setsize', filteredJobs.length);
            });
        }

        // Performance optimization - Virtual scrolling for large datasets
        function implementVirtualScrolling() {
            // This would be implemented for handling thousands of jobs efficiently
            console.log('Virtual scrolling would be implemented for large datasets');
        }

        // Initialize the application when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);

        // Service worker registration for offline functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }

        // Export functions for testing (in a real application)
        window.JobBoard = {
            applyFilters,
            sortJobs,
            toggleView,
            showJobDetails,
            handleApply,
            filteredJobs,
            jobsData
        };
    </script>
